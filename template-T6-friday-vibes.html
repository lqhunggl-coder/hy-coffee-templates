<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    .frame {
      width: 1080px;
      height: 1080px;
      position: relative;
      /* Amber/warm sunset gradient – Friday energy */
      background: linear-gradient(145deg, #3D1F00 0%, #6B3400 30%, #8B4A00 60%, #6B3F2A 100%);
      overflow: hidden;
    }

    /* Dynamic burst effect */
    .burst {
      position: absolute;
      border-radius: 50%;
    }
    .burst-1 {
      width: 800px; height: 800px;
      right: -200px; top: -200px;
      background: radial-gradient(circle, rgba(255,160,40,0.12) 0%, transparent 60%);
    }
    .burst-2 {
      width: 600px; height: 600px;
      left: -150px; bottom: -150px;
      background: radial-gradient(circle, rgba(196,100,40,0.10) 0%, transparent 60%);
    }

    /* Dynamic diagonal stripe */
    .stripe {
      position: absolute;
      width: 4px;
      background: rgba(255,160,40,0.06);
      transform-origin: top left;
    }
    .stripe-1 { height: 1200px; top: -100px; left: 280px; transform: rotate(25deg); }
    .stripe-2 { height: 1200px; top: -100px; left: 480px; transform: rotate(25deg); width: 2px; }
    .stripe-3 { height: 1200px; top: -100px; left: 680px; transform: rotate(25deg); width: 6px; opacity: 0.03; }

    /* Header area */
    .header {
      position: absolute;
      top: 56px; left: 64px; right: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .day-tag {
      background: rgba(255,160,40,0.15);
      border: 1px solid rgba(255,160,40,0.4);
      color: #FFA028;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 50px;
    }
    .brand-sm {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: rgba(245,230,200,0.7);
    }

    /* Main content */
    .main {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 72px;
      z-index: 10;
    }

    .friday-eyebrow {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,160,40,0.7);
      margin-bottom: 24px;
    }

    .big-text {
      font-family: 'Playfair Display', serif;
      font-size: 88px;
      font-weight: 700;
      color: #F5E6C8;
      line-height: 0.95;
      margin-bottom: 16px;
    }
    .big-text em { color: #FFA028; font-style: italic; }

    .vibe-text {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-style: italic;
      color: rgba(245,230,200,0.45);
      margin-bottom: 52px;
    }

    .divider {
      width: 80px; height: 2px;
      background: linear-gradient(to right, #FFA028, transparent);
      margin-bottom: 52px;
    }

    /* ⬇ BIẾN: message text */
    .message {
      font-size: 24px;
      font-weight: 400;
      color: rgba(245,230,200,0.80);
      line-height: 1.65;
      max-width: 820px;
      margin-bottom: 52px;
    }
    .message strong { color: #F5E6C8; font-weight: 600; }

    /* CTA chips */
    .cta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .cta-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,160,40,0.12);
      border: 1px solid rgba(255,160,40,0.3);
      color: rgba(245,230,200,0.85);
      font-size: 15px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 50px;
    }

    /* Footer bar */
    .footer-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 30px 72px;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid rgba(255,160,40,0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 22px; color: rgba(245,230,200,0.85); }
    .brand-sub { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,160,40,0.4); margin-top: 3px; }
    .brand-tag { font-size: 13px; color: rgba(255,160,40,0.4); text-align: right; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="burst burst-1"></div>
    <div class="burst burst-2"></div>
    <div class="stripe stripe-1"></div>
    <div class="stripe stripe-2"></div>
    <div class="stripe stripe-3"></div>

    <div class="header">
      <div class="day-tag">🎉 Friday Vibes</div>
      <div class="brand-sm">Hy Coffee</div>
    </div>

    <div class="main">
      <div class="friday-eyebrow">Thứ Sáu · Chào Cuối Tuần</div>

      <div class="big-text">
        Friday<br>
        <em>Vibes</em>
      </div>
      <!-- ⬇ BIẾN: {{friday_subtitle}} -->
      <div class="vibe-text">{{friday_subtitle}}</div>

      <div class="divider"></div>

      <!-- ⬇ BIẾN: {{friday_message}} -->
      <div class="message">{{friday_message}}</div>

      <!-- ⬇ BIẾN: {{cta_1}}, {{cta_2}} -->
      <div class="cta-row">
        <div class="cta-chip">☕ {{cta_1}}</div>
        <div class="cta-chip">🌿 {{cta_2}}</div>
      </div>
    </div>

    <div class="footer-bar">
      <div>
        <div class="brand-name">Hy Coffee</div>
        <div class="brand-sub">141 Cách Mạng Tháng 8, Pleiku</div>
      </div>
      <div class="brand-tag">#HyCoffee #FridayVibes</div>
    </div>
  </div>
</body>
</html>
