<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    .frame {
      width: 1080px;
      height: 1080px;
      position: relative;
      /* Xanh lá trầm – chủ đề sức khỏe */
      background: linear-gradient(145deg, #1A2E1A 0%, #243824 40%, #2E4A2E 70%, #3A5C3A 100%);
      overflow: hidden;
    }

    /* Organic blob shapes */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: rgba(107,168,107,0.08);
      top: -100px; right: -100px;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: rgba(196,149,106,0.06);
      bottom: -80px; left: -80px;
    }

    /* Leaf pattern overlay */
    .leaf-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cellipse cx='40' cy='20' rx='10' ry='18' fill='%23ffffff' transform='rotate(30 40 40)'/%3E%3C/svg%3E");
      background-size: 80px 80px;
    }

    /* Corner bracket */
    .corner-tl, .corner-br {
      position: absolute;
      width: 80px; height: 80px;
      border-color: rgba(107,168,107,0.3);
      border-style: solid;
    }
    .corner-tl { top: 48px; left: 48px; border-width: 2px 0 0 2px; }
    .corner-br { bottom: 48px; right: 48px; border-width: 0 2px 2px 0; }

    /* Header */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 56px 72px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 10;
    }

    .day-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(107,168,107,0.8);
    }

    .brand-logo-sm {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: rgba(245,230,200,0.7);
    }

    /* Main content */
    .main {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 100px 72px;
      z-index: 10;
    }

    .topic-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(107,168,107,0.15);
      border: 1px solid rgba(107,168,107,0.35);
      color: #7AB87A;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 50px;
      margin-bottom: 40px;
    }

    .big-title {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      font-weight: 700;
      color: #F5E6C8;
      line-height: 1.05;
      margin-bottom: 12px;
    }
    .big-title em { color: #7AB87A; font-style: italic; }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-style: italic;
      color: rgba(245,230,200,0.5);
      margin-bottom: 48px;
    }

    .divider {
      width: 72px; height: 2px;
      background: linear-gradient(to right, #7AB87A, transparent);
      margin-bottom: 48px;
    }

    /* Health facts */
    .facts-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 56px;
      max-width: 860px;
    }

    .fact-item {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      background: rgba(245,230,200,0.04);
      border: 1px solid rgba(245,230,200,0.08);
      border-left: 3px solid #7AB87A;
      padding: 20px 28px;
      border-radius: 12px;
    }

    .fact-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .fact-text {
      font-size: 19px;
      font-weight: 400;
      color: rgba(245,230,200,0.82);
      line-height: 1.5;
    }
    .fact-text strong {
      color: #F5E6C8;
      font-weight: 600;
    }

    .science-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(122,184,122,0.6);
      margin-top: 8px;
    }

    /* Brand bar */
    .brand-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 72px;
      border-top: 1px solid rgba(107,168,107,0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: rgba(245,230,200,0.85);
    }
    .brand-sub { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: rgba(122,184,122,0.5); margin-top: 3px; }
    .brand-tag { font-size: 13px; color: rgba(122,184,122,0.5); text-align: right; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="leaf-pattern"></div>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="header">
      <div class="day-label">Thứ Tư · Sức Khỏe &amp; Tips</div>
      <div class="brand-logo-sm">Hy Coffee</div>
    </div>

    <div class="main">
      <div class="topic-badge">🌿 Khoa Học Đồ Uống</div>

      <!-- ⬇ BIẾN: {{drink_name}} -->
      <div class="big-title">{{drink_name}}<br><em>cho sức khỏe</em></div>
      <!-- ⬇ BIẾN: {{drink_tagline}} -->
      <div class="subtitle">{{drink_tagline}}</div>

      <div class="divider"></div>

      <!-- ⬇ BIẾN: {{fact_1_icon}}, {{fact_1_text}}, {{fact_2_icon}}, {{fact_2_text}} -->
      <ul class="facts-list">
        <li class="fact-item">
          <span class="fact-icon">{{fact_1_icon}}</span>
          <div>
            <div class="fact-text">{{fact_1_text}}</div>
          </div>
        </li>
        <li class="fact-item">
          <span class="fact-icon">{{fact_2_icon}}</span>
          <div>
            <div class="fact-text">{{fact_2_text}}</div>
          </div>
        </li>
      </ul>
    </div>

    <div class="brand-bar">
      <div>
        <div class="brand-name">Hy Coffee</div>
        <div class="brand-sub">141 Cách Mạng Tháng 8, Pleiku</div>
      </div>
      <div class="brand-tag">#HyCoffee #SứcKhỏe</div>
    </div>
  </div>
</body>
</html>
