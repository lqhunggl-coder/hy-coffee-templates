<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    .frame {
      width: 1080px;
      height: 1080px;
      position: relative;
      /* Deep cream – contemplative Sunday mood */
      background: linear-gradient(160deg, #F5E6C8 0%, #EDD5A8 40%, #C4956A 80%, #9B6440 100%);
      overflow: hidden;
    }

    /* Soft texture overlay */
    .noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.6;
      pointer-events: none;
    }

    /* Large quote mark background */
    .bg-quote {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-size: 600px;
      font-weight: 700;
      color: rgba(61,35,20,0.06);
      line-height: 1;
      top: -80px;
      left: -30px;
      z-index: 0;
      user-select: none;
    }

    /* Thin decorative lines */
    .line-h {
      position: absolute;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(61,35,20,0.2), transparent);
    }
    .line-top { top: 120px; left: 80px; right: 80px; }
    .line-bot { bottom: 140px; left: 80px; right: 80px; }

    /* Header */
    .header {
      position: absolute;
      top: 56px; left: 0; right: 0;
      display: flex;
      justify-content: center;
      z-index: 10;
    }
    .sunday-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(61,35,20,0.08);
      border: 1px solid rgba(61,35,20,0.18);
      color: rgba(61,35,20,0.65);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      padding: 10px 28px;
      border-radius: 50px;
    }

    /* Main center */
    .main {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 140px 100px;
      z-index: 10;
    }

    .open-quote {
      font-family: 'Playfair Display', serif;
      font-size: 100px;
      color: rgba(61,35,20,0.25);
      line-height: 0.5;
      margin-bottom: 32px;
    }

    /* ⬇ BIẾN: {{quote_text}} */
    .quote-main {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      font-weight: 700;
      font-style: italic;
      color: #3D2314;
      line-height: 1.25;
      max-width: 820px;
      margin-bottom: 32px;
    }

    .close-quote {
      font-family: 'Playfair Display', serif;
      font-size: 100px;
      color: rgba(61,35,20,0.25);
      line-height: 0.5;
      margin-bottom: 52px;
    }

    /* Author / source */
    .quote-divider {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 48px;
    }
    .divider-line { width: 60px; height: 1px; background: rgba(61,35,20,0.25); }
    /* ⬇ BIẾN: {{quote_author}} */
    .quote-author {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(61,35,20,0.5);
    }

    /* ⬇ BIẾN: {{reflection}} */
    .reflection-text {
      font-size: 19px;
      font-weight: 400;
      color: rgba(61,35,20,0.65);
      line-height: 1.7;
      max-width: 680px;
      font-style: italic;
    }

    /* Brand footer */
    .footer-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 24px; color: rgba(61,35,20,0.75); }
    .brand-sub { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: rgba(61,35,20,0.35); margin-top: 3px; }
    .brand-tag { font-size: 13px; color: rgba(61,35,20,0.35); text-align: right; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="noise"></div>
    <div class="bg-quote">"</div>
    <div class="line-h line-top"></div>
    <div class="line-h line-bot"></div>

    <div class="header">
      <div class="sunday-badge">✨ Chủ Nhật · Quote &amp; Cảm Hứng</div>
    </div>

    <div class="main">
      <div class="open-quote">"</div>

      <!-- ⬇ BIẾN: {{quote_text}} -->
      <div class="quote-main">{{quote_text}}</div>

      <div class="close-quote">"</div>

      <div class="quote-divider">
        <div class="divider-line"></div>
        <!-- ⬇ BIẾN: {{quote_author}} -->
        <div class="quote-author">{{quote_author}}</div>
        <div class="divider-line"></div>
      </div>

      <!-- ⬇ BIẾN: {{reflection}} -->
      <div class="reflection-text">{{reflection}}</div>
    </div>

    <div class="footer-bar">
      <div>
        <div class="brand-name">Hy Coffee</div>
        <div class="brand-sub">Truyền Thống Việt Nam</div>
      </div>
      <div class="brand-tag">
        141 Cách Mạng Tháng 8, Pleiku<br>
        #HyCoffee #QuoteCuộcSống
      </div>
    </div>
  </div>
</body>
</html>
